services:
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api.dev
    ports:
      - "${API_PORT:-8000}:8000"
    env_file: .env
    volumes:
      - ./services/api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - veertrade

  broker:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.broker.dev
    ports:
      - "${BROKER_PORT:-8001}:8001"
    env_file: .env
    volumes:
      - ./services/broker:/app
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - veertrade

  strategy:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.strategy.dev
    ports:
      - "${STRATEGY_PORT:-8002}:8002"
    env_file: .env
    volumes:
      - ./services/strategy:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - veertrade

  notification:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.notification.dev
    ports:
      - "${NOTIFICATION_PORT:-8003}:8003"
    env_file: .env
    volumes:
      - ./services/notification:/app
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - veertrade

networks:
  veertrade:
    external: true
