upstream api { server api:8000; }
upstream broker { server broker:8001; }
upstream strategy { server strategy:8002; }
upstream notification { server notification:8003; }

server {
    listen 80;
    server_name veertrade.local;

    location /api/ { proxy_pass http://api/; }
    location /broker/ { proxy_pass http://broker/; }
    location /strategy/ { proxy_pass http://strategy/; }
    location /notify/ { proxy_pass http://notification/; }
}
