services:
  postgres:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-veertrade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-veertrade_dev}
      POSTGRES_DB: ${POSTGRES_DB:-veertrade}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-veertrade}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - veertrade

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - veertrade

networks:
  veertrade:
    driver: bridge

volumes:
  postgres_data:
